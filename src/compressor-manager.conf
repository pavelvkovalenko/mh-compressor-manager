# =============================================================================
# Конфигурационный файл mh-compressor-manager
# =============================================================================
# Этот файл управляет параметрами фонового сжатия файлов.
# Все изменения вступают в силу после перезапуска службы или отправки сигнала SIGHUP.
#
# Расположение: /etc/mh-compressor-manager/compressor-manager.conf
# =============================================================================

# -----------------------------------------------------------------------------
# ГЛОБАЛЬНЫЕ НАСТРОЙКИ (секция [general])
# -----------------------------------------------------------------------------
# Эти настройки применяются ко всем целевым директориям по умолчанию.
# Индивидуальные настройки для конкретных папок можно задать в секциях [folder_override:/путь/к/папке]
# -----------------------------------------------------------------------------

[general]

# -----------------------------------------------------------------------------
# 1. Целевые директории (Target Directories)
# -----------------------------------------------------------------------------
# Каталоги для мониторинга. Программа рекурсивно следит за всеми файлами в этих путях.
# Разделитель путей: точка с запятой (;).
# 
# ВАЖНО: Имена путей могут содержать пробелы, включая пробелы в конце имени.
# Примеры:
#   target_path=/var/www/html;/var/www/site1
#   target_path=/path/with spaces;/another/path with trailing space 
#
target_path=/var/www/html;/var/www/site1

# -----------------------------------------------------------------------------
# 2. Основные параметры (Basic Settings)
# -----------------------------------------------------------------------------

# Режим отладки (true/false).
# true: Вывод подробной отладочной информации в лог (трассировка потоков, детали алгоритмов).
# false: Стандартный режим (рекомендуется для продакшена).
debug=false

# Количество рабочих потоков для сжатия.
# 0 = автоматическое определение (все доступные ядра CPU).
# Рекомендуется устанавливать значение на 1 меньше количества ядер, чтобы не блокировать систему.
threads=0

# -----------------------------------------------------------------------------
# 3. Фильтрация файлов (File Filtering)
# -----------------------------------------------------------------------------

# Список расширений файлов для сжатия (без точек, через пробел).
# Только файлы с этими расширениями будут обрабатываться.
# Пример: txt js css svg json html htm map xml md
list=txt js css svg json html htm map

# -----------------------------------------------------------------------------
# 4. Настройки сжатия (Compression Settings)
# -----------------------------------------------------------------------------
# ВНИМАНИЕ: По умолчанию установлены МАКСИМАЛЬНЫЕ уровни сжатия.
# Это оптимально для фоновой обработки статики (логи, архивы), где важен размер,
# а не скорость. Для активных баз данных или часто меняющихся файлов снизьте уровень.

# Алгоритмы сжатия.
# Доступные варианты: gzip, brotli, all (использовать оба алгоритма).
# - gzip: Быстрее, универсальная совместимость (веб-серверы, архивы).
# - brotli: Лучший коэффициент сжатия, идеален для веб-контента (текст, JS, CSS).
algorithms=all

# Уровень сжатия для Gzip.
# Диапазон: 1 (быстро, большой размер) ... 9 (медленно, минимальный размер).
# По умолчанию: 9 (Максимальное сжатие).
gzip_level=9

# Уровень сжатия для Brotli.
# Диапазон: 1 ... 11 (максимальный).
# Уровни 10 и 11 требуют значительных ресурсов CPU и памяти, но дают лучший результат.
# По умолчанию: 11 (Максимальное сжатие).
brotli_level=11

# -----------------------------------------------------------------------------
# 4б. Минимальный размер файла для сжатия
# -----------------------------------------------------------------------------
# Минимальный размер файла (MIN_COMPRESS_SIZE) захаркожен на 256 байт.
# Это значение НЕЛЬЗЯ изменить — файлы менее 256 байт никогда не сжимаются.

# Оптимальный минимальный размер (OPTIMAL_MIN_COMPRESS_SIZE) — настраиваемый порог.
# Фактический минимум = max(256, optimal_min_compress_size).
# Если указать значение < 256, оно будет проигнорировано и использовано 256.
# По умолчанию: 1024 байт (файлы >= 1 КБ дают значительный выигрыш от сжатия).
optimal_min_compress_size=1024

# Устаревшее имя (поддерживается для обратной совместимости):
# optimal_compress_size=1024

# Устаревшее имя min_compress_size игнорируется — используйте optimal_min_compress_size.
# -----------------------------------------------------------------------------
# 5. Управление нагрузкой (Load Management)
# -----------------------------------------------------------------------------

# Задержка перед сжатием после последнего изменения файла (в секундах).
# Позволяет дождаться окончания записи в файл перед сжатием.
# Увеличьте значение, если файлы часто повреждаются при сжатии.
debounce_delay=2

# Ограничение I/O нагрузки для снижения влияния на другие процессы.
# io_delay_us - задержка между обработкой файлов в микросекундах (0 = без задержки).
# Используйте значения 1000-5000 (1-5 мс) на нагруженных системах.
io_delay_us=0

# max_active_ios - лимит параллельных I/O операций (0 = без лимита).
# Ограничивает количество одновременных операций чтения/записи.
# Полезно для предотвращения перегрузки дисковой подсистемы.
max_active_ios=0

# -----------------------------------------------------------------------------
# 6. Обработка файлов без расширений
# -----------------------------------------------------------------------------
# process_files_without_extensions - обрабатывать файлы без расширений (true/false).
# По умолчанию: false (обрабатываются только файлы с известными расширениями).
# Включите true если нужно сжимать файлы без расширений (например, бинарные файлы, логи без расширения).
# Внимание: это может увеличить нагрузку на CPU, так как будут обрабатываться все файлы без расширений.
process_files_without_extensions=false

# -----------------------------------------------------------------------------
# 7. Безопасность (Security Settings)
# -----------------------------------------------------------------------------

# Сбрасывать привилегии после запуска (true/false).
# Рекомендуется true для запуска от root.
drop_privileges=true

# Включить песочницу seccomp (true/false).
# Ограничивает системные вызовы для повышения безопасности.
enable_seccomp=true

# Явный пользователь для сброса прав (пусто = автоматический выбор).
run_as_user=

# mh-compressor-manager: MERGE_BOUNDARY (не удалять: граница для merge-compressor-conf.sh при обновлении)
# =============================================================================
# ИНДИВИДУАЛЬНЫЕ НАСТРОЙКИ ДЛЯ ПАПОК (Folder Overrides)
# =============================================================================
# Секции [folder_override:/путь/к/папке] позволяют задать индивидуальные параметры
# для конкретных директорий. Эти настройки переопределяют глобальные значения
# для файлов в указанных папках и их подпапках (если recursive=true).
#
# Формат секции: [folder_override:/полный/путь/к/папке]
#
# ВАЖНО:
# - Путь должен быть абсолютным
# - Путь может содержать пробелы (в том числе в конце)
# - Проверка на безопасность: пути с ".." отклоняются
# - При совпадении нескольких правил применяется наиболее специфичное (самый длинный путь)
#
# Доступные параметры для переопределения:
# - compression_level_gzip: Уровень сжатия gzip (1-9)
# - compression_level_brotli: Уровень сжатия brotli (1-11)
# - extensions: Список расширений для этой папки (переопределяет глобальный list)
# - process_files_without_extensions: Обрабатывать файлы без расширений (true/false)
# - recursive: Рекурсивная обработка подпапок (true/false, по умолчанию true)
# - rate_limit: Лимит операций сжатия в минуту для этой папки (0 = без лимита)
# - io_delay_us: Задержка I/O для этой папки (микросекунды)
# - max_active_ios: Лимит параллельных I/O для этой папки
# =============================================================================

# -----------------------------------------------------------------------------
# ПРИМЕР 1: Папка с логами (низкий приоритет, минимальная нагрузка на CPU)
# -----------------------------------------------------------------------------
# Для папки с логами устанавливаем низкий уровень сжатия и ограничение скорости,
# чтобы не мешать основной работе сервера.
#
# [folder_override:/var/log/myapp]
# compression_level_gzip = 4
# compression_level_brotli = 4
# extensions = log txt
# rate_limit = 30
# io_delay_us = 5000
# recursive = true

# -----------------------------------------------------------------------------
# ПРИМЕР 2: Папка с критичным веб-контентом (максимальное сжатие)
# -----------------------------------------------------------------------------
# Для статического контента используем максимальное сжатие Brotli,
# так как файлы редко меняются, а экономия трафика важна.
#
# [folder_override:/var/www/html/static]
# compression_level_gzip = 9
# compression_level_brotli = 11
# extensions = js css svg json html htm
# process_files_without_extensions = false
# recursive = true

# -----------------------------------------------------------------------------
# ПРИМЕР 3: Папка с пробелами в имени пути
# -----------------------------------------------------------------------------
# Поддерживаются пути с пробелами, включая пробелы в конце имени.
# Обратите внимание: путь указывается как есть, без кавычек.
#
# [folder_override:/var/www/my site/content ]
# compression_level_gzip = 6
# compression_level_brotli = 8
# extensions = html htm txt
# recursive = true

# -----------------------------------------------------------------------------
# ПРИМЕР 4: Отключение рекурсии для конкретной папки
# -----------------------------------------------------------------------------
# Обрабатываем только файлы в корне папки, игнорируя подпапки.
#
# [folder_override:/var/www/html/no-subdirs]
# compression_level_gzip = 5
# extensions = txt
# recursive = false

# -----------------------------------------------------------------------------
# ПРИМЕР 5: Обработка файлов без расширений в специфичной папке
# -----------------------------------------------------------------------------
# Включаем обработку файлов без расширений только для определенной папки.
#
# [folder_override:/var/www/html/binaries]
# compression_level_gzip = 6
# process_files_without_extensions = true
# extensions = 
# recursive = true


# =============================================================================
# ПРИМЕРЫ КОНФИГУРАЦИЙ ДЛЯ РАЗНЫХ СЦЕНАРИЕВ
# =============================================================================
# Скопируйте нужный блок ниже и замените им текущие настройки выше.

# --- СЦЕНАРИЙ А: Архивация холодных данных (Максимальная экономия места) ---
# Используйте для бэкапов и старых логов, которые редко читаются.
# [general]
# target_path=/var/backups;/archive
# debug=false
# threads=2
# list=txt log sql xml json
# algorithms=brotli
# brotli_level=11
# gzip_level=9
# debounce_delay=5
# io_delay_us=0

# --- СЦЕНАРИЙ Б: Активные логи веб-сервера (Баланс) ---
# Компромисс между размером и нагрузкой на CPU в реальном времени.
# [general]
# target_path=/var/log/nginx;/var/log/apache2
# debug=false
# threads=4
# list=log txt
# algorithms=gzip
# gzip_level=6
# debounce_delay=3
# io_delay_us=1000

# --- СЦЕНАРИЙ В: Веб-сервер (Nginx/Apache) ---
# Сжатие только в Brotli для отдачи контента браузером.
# [general]
# target_path=/var/www/html;/usr/share/nginx/html
# debug=false
# threads=0
# list=html htm css js json svg xml
# algorithms=brotli
# brotli_level=9
# debounce_delay=1
# io_delay_us=0

# --- СЦЕНАРИЙ Г: Отладка и тестирование ---
# Минимальное сжатие для быстрой проверки работы программы.
# [general]
# target_path=/tmp/test_compression
# debug=true
# threads=1
# list=txt
# algorithms=gzip
# gzip_level=1
# debounce_delay=0
# io_delay_us=0
