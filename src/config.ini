# ============================================
# Конфигурационный файл mh-compressor-manager
# ============================================
# Программа для фонового сжатия статических файлов
# Поддерживаемые алгоритмы: gzip, brotli
#
# Использование:
#   mh-compressor-manager --config /path/to/config.ini
#
# ============================================

[general]
# --------------------------------------------
# Целевые пути для мониторинга и сжатия
# Можно указать несколько путей через точку с запятой
# Пример: target_path=/var/www/html;/var/log/nginx
# --------------------------------------------
target_path=/var/www/html

# --------------------------------------------
# Режим отладки (true/false)
# При включении выводится подробная информация о процессе сжатия
# --------------------------------------------
debug=false

# --------------------------------------------
# Количество потоков для сжатия
# 0 = автоопределение по количеству ядер CPU
# Рекомендуемое значение: от 1 до количества ядер - 1
# --------------------------------------------
threads=0

# --------------------------------------------
# Расширения файлов для сжатия (через пробел)
# Программа будет сжимать только файлы с указанными расширениями
# --------------------------------------------
list=txt js css svg json html htm map xml log md

# --------------------------------------------
# Алгоритмы сжатия (через запятую)
# Доступные значения: gzip, brotli, all
# - gzip: быстрое сжатие, хорошая совместимость
# - brotli: лучшее сжатие, поддержка современными браузерами
# - all: использовать оба алгоритма (создаются .gz и .br файлы)
# --------------------------------------------
algorithms=all

# --------------------------------------------
# Уровень сжатия Gzip (1-9)
# 1 = минимальное сжатие, максимальная скорость
# 9 = максимальное сжатие, минимальная скорость
# Значение по умолчанию: 9 (максимальное, т.к. работа в фоне)
# --------------------------------------------
gzip_level=9

# --------------------------------------------
# Уровень сжатия Brotli (1-11)
# 1 = минимальное сжатие, максимальная скорость
# 11 = максимальное сжатие, минимальная скорость
# Значение по умолчанию: 11 (максимальное, т.к. работа в фоне)
# --------------------------------------------
brotli_level=11

# --------------------------------------------
# Задержка debounce (в секундах, 0-60)
# Время ожидания после события изменения файла перед началом сжатия
# Полезно для файлов, которые часто обновляются (логи)
# --------------------------------------------
debounce_delay=2

# --------------------------------------------
# Задержка I/O (в микросекундах, 0-1000000)
# Искусственная задержка между операциями ввода-вывода
# Используйте для снижения нагрузки на диск
# 0 = без задержек
# --------------------------------------------
io_delay_us=0

# --------------------------------------------
# Максимальное количество активных I/O операций
# 0 = без ограничений
# Рекомендуется установить для систем с медленными дисками
# --------------------------------------------
max_active_ios=0


# ============================================
# ПРИМЕРЫ КОНФИГУРАЦИЙ ДЛЯ РАЗЛИЧНЫХ СЦЕНАРИЕВ
# ============================================
# Скопируйте нужный блок и замените им секцию [general] выше
# ============================================

# --------------------------------------------
# ❄️ СЦЕНАРИЙ 1: ХОЛОДНОЕ АРХИВИРОВАНИЕ
# Максимальная экономия места для старых данных
# Подходит для: архивов логов, бэкапов, редко используемых файлов
# --------------------------------------------
# [general]
# target_path=/var/archive/logs
# debug=false
# threads=2
# list=txt log csv json xml
# algorithms=all
# gzip_level=9
# brotli_level=11
# debounce_delay=5
# io_delay_us=100
# max_active_ios=4

# --------------------------------------------
# ⚖️ СЦЕНАРИЙ 2: БАЛАНС (АКТИВНЫЕ ЛОГИ)
# Компромисс между размером и нагрузкой на CPU
# Подходит для: активно растущих логов веб-сервера
# --------------------------------------------
# [general]
# target_path=/var/log/nginx;/var/log/apache2
# debug=false
# threads=4
# list=log txt
# algorithms=gzip
# gzip_level=6
# brotli_level=4
# debounce_delay=10
# io_delay_us=50
# max_active_ios=8

# --------------------------------------------
# 🌐 СЦЕНАРИЙ 3: WEB-СЕРВЕР (OPTIMIZATION)
# Оптимизация под современные браузеры (только Brotli)
# Подходит для: статических файлов веб-сайта
# --------------------------------------------
# [general]
# target_path=/var/www/html/static
# debug=false
# threads=0
# list=js css svg json html htm map
# algorithms=brotli
# gzip_level=9
# brotli_level=11
# debounce_delay=1
# io_delay_us=0
# max_active_ios=0

# --------------------------------------------
# 🛠️ СЦЕНАРИЙ 4: ОТЛАДОЧНЫЙ РЕЖИМ
# Минимальное сжатие для быстрого тестирования
# Подходит для: разработки и тестирования логики
# --------------------------------------------
# [general]
# target_path=/tmp/test_files
# debug=true
# threads=1
# list=txt js css
# algorithms=gzip
# gzip_level=1
# brotli_level=1
# debounce_delay=0
# io_delay_us=0
# max_active_ios=0

# --------------------------------------------
# 🚀 СЦЕНАРИЙ 5: ВЫСОКОНАГРУЖЕННАЯ СИСТЕМА
# Ограничение ресурсов для работы в продакшене
# Подходит для: серверов с высокой нагрузкой
# --------------------------------------------
# [general]
# target_path=/var/www/html
# debug=false
# threads=2
# list=txt js css svg json html
# algorithms=all
# gzip_level=7
# brotli_level=9
# debounce_delay=3
# io_delay_us=200
# max_active_ios=4
